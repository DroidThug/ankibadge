name: Build and Release Add-on

on:
  push:
    tags:
      - 'v*' # Triggers automatically when you push a tag like v1.0.0
  workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to let GitHub Actions publish a release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package Add-on
        run: |
          # Zip the root directory into AnkiBadge.ankiaddon
          # Excludes git folders, python caches, and repo-specific files
          zip -r AnkiBadge.ankiaddon . -x "*.git*" "*.github*" "*.DS_Store" "*__pycache__*" "*.pyc" "README.md" "screenshot.png"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnkiBadge
          path: AnkiBadge.ankiaddon

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AnkiBadge.ankiaddon
          generate_release_notes: true
